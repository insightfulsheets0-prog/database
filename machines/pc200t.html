<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC200t — Sistem Produksi &amp; Downtime</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1e24">
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabaseClient.js"></script>
<script src="../assets/machine-page.js"></script>
</head>
<body>

<div class="app-shell"
     x-data='machinePage("pc200t", "PC200t", [], 2, ["MESIN", "DIES", "OTHER"])'
     x-init="init()">
  <div class="mobile-topbar">
    <button class="hamburger" @click="mobileNavOpen = true">☰</button>
    <span class="mobile-title">PC200t</span>
  </div>
  <div class="sidebar-overlay" x-show="mobileNavOpen" @click="mobileNavOpen = false" x-cloak></div>
  <aside class="sidebar" :class="mobileNavOpen ? 'sidebar-open' : ''">
    <div class="sidebar-brand">PRODUKSI<span>&amp;</span>DOWNTIME</div>
    <nav class="sidebar-nav" @click="mobileNavOpen = false">
      <a href="../index.html" class="sidebar-link">🏠 Dashboard</a>
      <a href="tandem.html" class="sidebar-link">⚙️ Tandem</a>
      <a href="blanking.html" class="sidebar-link">⚙️ Blanking</a>
      <a href="transfer-2000t.html" class="sidebar-link">⚙️ Transfer 2000t</a>
      <a href="transfer-800t.html" class="sidebar-link">⚙️ Transfer 800t</a>
      <a href="pc200t.html" class="sidebar-link active">⚙️ PC200t</a>
    </nav>
    <div class="sidebar-foot">
      <div class="who" x-text="profile?.full_name || session?.user?.email || '...'"></div>
      <span class="badge" :class="profile?.role === 'admin' ? 'role-admin' : ''" x-text="profile?.role || '...'"></span>
      <div class="net-status" :class="isOnline ? 'net-online' : 'net-offline'">
        <span x-text="isOnline ? '🟢 Online' : '🔴 Offline'"></span>
        <span x-show="pendingCount > 0" x-text="'· ' + pendingCount + ' menunggu sinkron'"></span>
      </div>
      <button class="btn-ghost btn-sm" @click="logout()">Keluar</button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">
        <span class="eyebrow">Mesin</span>
        PC200t
      </h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-secondary btn-sm" :class="tab==='produksi' ? 'btn-primary' : ''" @click="tab='produksi'">Produksi</button>
        <button class="btn-secondary btn-sm" :class="tab==='downtime' ? 'btn-primary' : ''" @click="tab='downtime'">Downtime</button>
        <button class="btn-secondary btn-sm" :class="tab==='master' ? 'btn-primary' : ''" @click="tab='master'">Master Data</button>
      </div>
    </div>

    <template x-if="errorMsg"><div class="error-msg" x-text="errorMsg"></div></template>
    <template x-if="successMsg"><div class="success-msg" x-text="successMsg"></div></template>
    <template x-if="!isOnline">
      <div class="offline-banner">📴 Tidak ada jaringan — data baru akan disimpan di HP dan disinkron otomatis begitu online lagi.</div>
    </template>

    <template x-if="loading">
      <div class="empty-state">Memuat data...</div>
    </template>

    <template x-if="!loading">
      <div>
        <!-- ===================== TAB PRODUKSI ===================== -->
        <div x-show="tab === 'produksi'">
          <div class="panel">
            <p class="panel-title" x-text="editingProductionId ? 'Edit Data Produksi' : 'Catat Produksi'"></p>

            <div class="timer-row" x-show="!editingProductionId">
              <template x-if="prodState === 'idle'">
                <button type="button" class="btn-primary" @click="startProduction()">▶ Mulai Produksi</button>
              </template>
              <template x-if="prodState !== 'idle'">
                <div class="timer-badge">
                  <span class="timer-dot" :class="prodState==='running' ? 'timer-dot-live' : ''"></span>
                  <span>Mulai <b x-text="fmtClock(prodStart)"></b></span>
                  <template x-if="prodState === 'running'">
                    <button type="button" class="btn-secondary btn-sm" @click="stopProduction()">⏹ Selesai</button>
                  </template>
                  <template x-if="prodState === 'stopped'">
                    <span>· Selesai <b x-text="fmtClock(prodEnd)"></b></span>
                  </template>
                  <button type="button" class="btn-ghost btn-sm" @click="cancelProductionTimer()">Batal</button>
                </div>
              </template>
            </div>
            <p class="hint" x-show="editingProductionId">Mode edit — waktu diambil dari data yang sudah ada, tidak pakai timer.</p>

            <form @submit.prevent="submitProduction" x-show="editingProductionId || prodState !== 'idle'" x-cloak>
              <div class="form-grid">
                <div class="field">
                  <label>Part Number</label>
                  <input type="text" list="partNumberList-pc200t" x-model="productionForm.part_number" placeholder="Ketik atau pilih...">
                  <datalist id="partNumberList-pc200t">
                    <template x-for="opt in partNumberList" :key="opt.id">
                      <option :value="opt.value"></option>
                    </template>
                  </datalist>
                </div>
                <div class="field">
                  <label>Qty</label>
                  <input type="number" x-model="productionForm.qty">
                </div>
                <div class="field">
                  <label>NG</label>
                  <input type="number" x-model="productionForm.ng">
                </div>
                <div class="field">
                  <label>Kategori NG</label>
                  <input type="text" x-model="productionForm.kategori_ng">
                </div>
                <div class="field">
                  <label>Break (menit)</label>
                  <input type="number" x-model="productionForm.break_menit">
                </div>

              </div>

              <div class="field" x-show="routingMax > 0" style="margin-bottom:16px;">
                <label>Routing</label>
                <div class="chip-row">
                  <button type="button" class="chip" :class="routingType==='WIP' ? 'chip-active' : ''" @click="setRoutingType('WIP')">WIP</button>
                  <button type="button" class="chip" :class="routingType==='FG' ? 'chip-active' : ''" @click="setRoutingType('FG')">FG</button>
                </div>
                <div class="chip-row" x-show="routingType" style="margin-top:8px;">
                  <template x-for="n in routingRange()" :key="n">
                    <button type="button" class="chip chip-num" :class="routingNumbers.includes(n) ? 'chip-active' : ''" @click="toggleRoutingNumber(n)" x-text="n"></button>
                  </template>
                </div>
              </div>

              <div class="form-actions">
                <button type="button" class="btn-ghost" x-show="editingProductionId" @click="resetProductionForm()">Batal Edit</button>
                <button type="submit" class="btn-primary"
                        :disabled="!editingProductionId && prodState !== 'stopped'"
                        x-text="editingProductionId ? 'Simpan Perubahan' : 'Simpan Data'"></button>
              </div>
            </form>
          </div>

          <div class="panel">
            <p class="panel-title">Riwayat Produksi <span class="count" x-text="productionRows.length + ' baris'"></span></p>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Waktu Awal</th><th>Waktu Akhir</th><th>Durasi</th>
                    <th>Part Number</th><th>Qty</th><th>NG</th><th>Kategori NG</th><th>Break</th>

                    <th x-show="routingMax > 0">Routing</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in productionRows" :key="row.id">
                    <tr :class="row._pending ? 'row-pending' : ''">
                      <td class="mono" x-text="fmt(row.waktu_awal)"></td>
                      <td class="mono" x-text="fmt(row.waktu_akhir)"></td>
                      <td class="mono" x-text="durasiMenit(row.waktu_awal, row.waktu_akhir)"></td>
                      <td x-text="row.part_number || '-'"></td>
                      <td x-text="row.qty ?? '-'"></td>
                      <td x-text="row.ng ?? '-'"></td>
                      <td x-text="row.kategori_ng || '-'"></td>
                      <td x-text="row.break_menit ?? '-'"></td>

                      <td x-show="routingMax > 0" x-text="routingLabel(row)"></td>
                      <td>
                        <span class="badge" x-show="row._pending">⏳ Belum sinkron</span>
                        <div class="row-actions" x-show="!row._pending">
                          <button class="btn-secondary btn-sm" @click="editProduction(row)">Edit</button>
                          <button class="btn-danger btn-sm" @click="deleteProduction(row.id)">Hapus</button>
                        </div>
                      </td>
                    </tr>
                  </template>
                  <tr x-show="productionRows.length === 0">
                    <td colspan="20" class="empty-state">Belum ada data produksi untuk mesin ini.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ===================== TAB DOWNTIME ===================== -->
        <div x-show="tab === 'downtime'">
          <div class="panel">
            <p class="panel-title" x-text="editingDowntimeId ? 'Edit Data Downtime' : 'Catat Downtime'"></p>

            <div class="timer-row" x-show="!editingDowntimeId">
              <template x-if="dtState === 'idle'">
                <button type="button" class="btn-primary" @click="startDowntime()">▶ Mulai Downtime</button>
              </template>
              <template x-if="dtState !== 'idle'">
                <div class="timer-badge">
                  <span class="timer-dot" :class="dtState==='running' ? 'timer-dot-live' : ''"></span>
                  <span>Mulai <b x-text="fmtClock(dtStart)"></b></span>
                  <template x-if="dtState === 'running'">
                    <button type="button" class="btn-secondary btn-sm" @click="stopDowntime()">⏹ Selesai</button>
                  </template>
                  <template x-if="dtState === 'stopped'">
                    <span>· Selesai <b x-text="fmtClock(dtEnd)"></b></span>
                  </template>
                  <button type="button" class="btn-ghost btn-sm" @click="cancelDowntimeTimer()">Batal</button>
                </div>
              </template>
            </div>
            <p class="hint" x-show="editingDowntimeId">Mode edit — waktu diambil dari data yang sudah ada, tidak pakai timer.</p>

            <form @submit.prevent="submitDowntime" x-show="editingDowntimeId || dtState !== 'idle'" x-cloak>
              <div class="form-grid">
                <div class="field">
                  <label>Kategori</label>
                  <select x-model="downtimeForm.kategori">
                    <option value="">- pilih -</option>
                    <template x-for="k in kategoriOptions" :key="k">
                      <option :value="k" x-text="k"></option>
                    </template>
                  </select>
                </div>
                <div class="field" style="grid-column: span 2;">
                  <label>Problem</label>
                  <input type="text" list="problemList-pc200t" x-model="downtimeForm.problem" placeholder="Ketik atau pilih...">
                  <datalist id="problemList-pc200t">
                    <template x-for="opt in problemList" :key="opt.id">
                      <option :value="opt.value"></option>
                    </template>
                  </datalist>
                </div>
                <div class="field" style="grid-column: span 2;">
                  <label>Penyebab</label>
                  <input type="text" x-model="downtimeForm.penyebab">
                </div>
                <div class="field" style="grid-column: span 2;">
                  <label>Countermeasure</label>
                  <input type="text" x-model="downtimeForm.countermeasure">
                </div>
              </div>
              <div class="form-actions">
                <button type="button" class="btn-ghost" x-show="editingDowntimeId" @click="resetDowntimeForm()">Batal Edit</button>
                <button type="submit" class="btn-primary"
                        :disabled="!editingDowntimeId && dtState !== 'stopped'"
                        x-text="editingDowntimeId ? 'Simpan Perubahan' : 'Simpan Data'"></button>
              </div>
            </form>
          </div>

          <div class="panel">
            <p class="panel-title">Riwayat Downtime <span class="count" x-text="downtimeRows.length + ' baris'"></span></p>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Waktu Awal</th><th>Waktu Akhir</th><th>Durasi</th>
                    <th>Kategori</th><th>Problem</th><th>Penyebab</th><th>Countermeasure</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in downtimeRows" :key="row.id">
                    <tr :class="row._pending ? 'row-pending' : ''">
                      <td class="mono" x-text="fmt(row.waktu_awal)"></td>
                      <td class="mono" x-text="fmt(row.waktu_akhir)"></td>
                      <td class="mono" x-text="durasiMenit(row.waktu_awal, row.waktu_akhir)"></td>
                      <td><span class="badge" x-text="row.kategori || '-'"></span></td>
                      <td x-text="row.problem || '-'"></td>
                      <td x-text="row.penyebab || '-'"></td>
                      <td x-text="row.countermeasure || '-'"></td>
                      <td>
                        <span class="badge" x-show="row._pending">⏳ Belum sinkron</span>
                        <div class="row-actions" x-show="!row._pending">
                          <button class="btn-secondary btn-sm" @click="editDowntime(row)">Edit</button>
                          <button class="btn-danger btn-sm" @click="deleteDowntime(row.id)">Hapus</button>
                        </div>
                      </td>
                    </tr>
                  </template>
                  <tr x-show="downtimeRows.length === 0">
                    <td colspan="8" class="empty-state">Belum ada data downtime untuk mesin ini.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ===================== TAB MASTER DATA ===================== -->
        <div x-show="tab === 'master'">
          <div class="panel">
            <p class="panel-title">Daftar Part Number <span class="count" x-text="partNumberList.length + ' item'"></span></p>
            <p class="hint" style="margin-bottom:12px;">Dropdown Part Number di form Produksi ambil dari daftar ini. Klik teksnya untuk edit, klik di luar untuk simpan.</p>
            <div class="master-add-row">
              <input type="text" x-model="newPartNumberValue" @keyup.enter="addMasterPartNumber()" placeholder="Tambah part number baru...">
              <button type="button" class="btn-primary btn-sm" @click="addMasterPartNumber()">+ Tambah</button>
            </div>
            <div class="master-list">
              <template x-for="item in partNumberList" :key="item.id">
                <div class="master-list-row">
                  <input type="text" x-model="item.value" @blur="updateMasterPartNumber(item)" @keyup.enter="$event.target.blur()">
                  <button type="button" class="btn-danger btn-sm" @click="deleteMasterPartNumber(item.id)">Hapus</button>
                </div>
              </template>
              <p class="empty-state" x-show="partNumberList.length === 0">Belum ada data. Tambah lewat kotak di atas.</p>
            </div>
          </div>

          <div class="panel">
            <p class="panel-title">Daftar Problem Downtime <span class="count" x-text="problemList.length + ' item'"></span></p>
            <p class="hint" style="margin-bottom:12px;">Dropdown Problem di form Downtime ambil dari daftar ini.</p>
            <div class="master-add-row">
              <input type="text" x-model="newProblemValue" @keyup.enter="addMasterProblem()" placeholder="Tambah problem baru...">
              <button type="button" class="btn-primary btn-sm" @click="addMasterProblem()">+ Tambah</button>
            </div>
            <div class="master-list">
              <template x-for="item in problemList" :key="item.id">
                <div class="master-list-row">
                  <input type="text" x-model="item.value" @blur="updateMasterProblem(item)" @keyup.enter="$event.target.blur()">
                  <button type="button" class="btn-danger btn-sm" @click="deleteMasterProblem(item.id)">Hapus</button>
                </div>
              </template>
              <p class="empty-state" x-show="problemList.length === 0">Belum ada data. Tambah lewat kotak di atas.</p>
            </div>
          </div>
        </div>
      </div>
    </template>
  </main>
</div>

</body>
</html>
