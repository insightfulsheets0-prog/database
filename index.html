<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Sistem Produksi & Downtime</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f4f5f7">
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="assets/supabaseClient.js"></script>
</head>
<body>

<div class="app-shell" x-data="dashboard()" x-init="init()">
  <div class="mobile-topbar">
    <button class="hamburger" @click="mobileNavOpen = true">☰</button>
    <span class="mobile-title">Dashboard</span>
  </div>
  <div class="sidebar-overlay" x-show="mobileNavOpen" @click="mobileNavOpen = false" x-cloak></div>
  <aside class="sidebar" :class="[mobileNavOpen ? 'sidebar-open' : '', sidebarCollapsed ? 'sidebar-collapsed' : '']">
    <button class="sidebar-collapse-btn" @click="sidebarCollapsed = !sidebarCollapsed">
      <span x-show="!sidebarCollapsed">‹</span><span x-show="sidebarCollapsed">›</span>
    </button>
    <div class="sidebar-brand" x-show="!sidebarCollapsed">PRODUKSI<span>&amp;</span>DOWNTIME</div>
    <nav class="sidebar-nav" @click="mobileNavOpen = false">
      <a href="index.html" class="sidebar-link active"><span>🏠</span><span x-show="!sidebarCollapsed">Dashboard</span></a>
      <a href="machines/tandem.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">Tandem</span></a>
      <a href="machines/blanking.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">Blanking</span></a>
      <a href="machines/transfer-2000t.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">Transfer 2000t</span></a>
      <a href="machines/transfer-800t.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">Transfer 800t</span></a>
      <a href="machines/pc200t.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">PC200t</span></a>
    </nav>
    <div class="sidebar-foot" x-show="!sidebarCollapsed">
      <div class="who" x-text="profile?.full_name || session?.user?.email || '...'"></div>
      <span class="badge" :class="profile?.role === 'admin' ? 'role-admin' : ''" x-text="profile?.role || '...'"></span>
      <button class="btn-ghost btn-sm" @click="logout()">Keluar</button>
    </div>
    <button class="sidebar-logout-collapsed" x-show="sidebarCollapsed" @click="logout()" title="Keluar">⏻</button>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title"><span class="eyebrow">Ringkasan</span>Dashboard Produksi</h1>
      <div class="perf-toggle-row" style="margin:0;">
        <button type="button" class="chip" :class="period==='harian' ? 'chip-active' : ''" @click="setPeriod('harian')">Hari Ini</button>
        <button type="button" class="chip" :class="period==='bulanan' ? 'chip-active' : ''" @click="setPeriod('bulanan')">Bulan Ini</button>
        <button type="button" class="chip" :class="period==='tahunan' ? 'chip-active' : ''" @click="setPeriod('tahunan')">Tahun Ini</button>
      </div>
    </div>

    <template x-if="loading"><p class="empty-state">Memuat data seluruh line...</p></template>

    <template x-if="!loading">
      <div>
        <div class="fleet-summary-grid">
          <div class="perf-card perf-card-oee">
            <span class="perf-label">OEE Rata-rata Fleet</span>
            <span class="perf-value perf-value-xl" x-text="fmtNum(fleetOee) + '%'"></span>
          </div>
          <div class="perf-card"><span class="perf-label">Total Stroke</span><span class="perf-value" x-text="fmtNum(fleetTotals.stroke)"></span></div>
          <div class="perf-card"><span class="perf-label">Total Downtime</span><span class="perf-value" x-text="fmtNum(fleetTotals.downtimeMenit) + ' mnt'"></span></div>
          <div class="perf-card"><span class="perf-label">Total NG</span><span class="perf-value" x-text="fmtNum(fleetTotals.ng)"></span></div>
        </div>

        <div class="panel">
          <p class="panel-title">Status Tiap Line</p>
          <div class="machine-cards-grid">
            <template x-for="m in machines" :key="m.key">
              <a :href="m.href" class="machine-card" :class="oeeClass(m.data?.oee)">
                <div class="machine-card-top">
                  <span class="machine-card-name" x-text="m.label"></span>
                  <span class="machine-card-oee" x-text="fmtNum(m.data?.oee) + '%'"></span>
                </div>
                <div class="machine-card-stats">
                  <div><span class="hint">GSPH</span><b x-text="fmtNum(m.data?.gsph)"></b></div>
                  <div><span class="hint">Availability</span><b x-text="fmtNum(m.data?.availability) + '%'"></b></div>
                  <div><span class="hint">Downtime</span><b x-text="fmtNum(m.data?.downtimeMenit) + ' mnt'"></b></div>
                </div>
              </a>
            </template>
          </div>
        </div>

        <div class="panel">
          <p class="panel-title">Downtime per Kategori × Line</p>
          <div class="perf-chart-wrap" style="height:300px;"><canvas id="fleetDowntimeChart"></canvas></div>
        </div>

        <div class="panel">
          <p class="panel-title">10 Downtime Terburuk (Semua Line)</p>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Line</th><th>Kategori</th><th>Problem</th><th>Menit</th></tr></thead>
              <tbody>
                <template x-for="row in fleetTop10" :key="row.mesin + row.kategori + row.problem">
                  <tr>
                    <td><span class="badge" x-text="row.mesinLabel"></span></td>
                    <td x-text="row.kategori"></td>
                    <td x-text="row.problem"></td>
                    <td class="mono" x-text="fmtNum(row.menit)"></td>
                  </tr>
                </template>
                <tr x-show="fleetTop10.length === 0"><td colspan="4" class="empty-state">Tidak ada downtime di periode ini.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </template>
  </main>
</div>

<script>
const MACHINES = [
  { key: "tandem", label: "Tandem", href: "machines/tandem.html" },
  { key: "blanking", label: "Blanking", href: "machines/blanking.html" },
  { key: "transfer_2000t", label: "Transfer 2000t", href: "machines/transfer-2000t.html" },
  { key: "transfer_800t", label: "Transfer 800t", href: "machines/transfer-800t.html" },
  { key: "pc200t", label: "PC200t", href: "machines/pc200t.html" },
];

function fmtNum(n) {
  if (n === null || n === undefined || Number.isNaN(Number(n))) return "-";
  return Number(n).toLocaleString("en-US", { maximumFractionDigits: 1 });
}

function periodBounds(period) {
  const now = new Date();
  if (period === "tahunan") return { start: new Date(now.getFullYear(), 0, 1), end: new Date(now.getFullYear() + 1, 0, 1) };
  if (period === "bulanan") return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(now.getFullYear(), now.getMonth() + 1, 1) };
  return { start: new Date(now.getFullYear(), now.getMonth(), now.getDate()), end: new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) };
}

function dashboard() {
  return {
    session: null, profile: null, mobileNavOpen: false, sidebarCollapsed: true,
    loading: true, period: "bulanan",
    machines: MACHINES.map((m) => ({ ...m, data: null })),
    fleetTotals: { stroke: 0, downtimeMenit: 0, ng: 0 },
    fleetOee: 0, fleetTop10: [], chart: null,

    fmtNum,
    async init() {
      this.session = await requireAuth();
      if (!this.session) return;
      try {
        const { data } = await supabaseClient.from("profiles").select("*").eq("id", this.session.user.id).maybeSingle();
        this.profile = data;
      } catch (err) { console.error(err); }
      await this.fetchFleet();
    },
    setPeriod(p) { this.period = p; this.fetchFleet(); },

    async fetchFleet() {
      this.loading = true;
      const { start, end } = periodBounds(this.period);
      const results = await Promise.all(MACHINES.map(async (m) => {
        const [aggRes, settingsRes, top5Res, catRes] = await Promise.all([
          supabaseClient.rpc("performance_aggregate", { p_mesin: m.key, p_stasiun_list: null, p_start: start.toISOString(), p_end: end.toISOString() }),
          supabaseClient.from("mesin_settings").select("*").eq("mesin", m.key).maybeSingle(),
          supabaseClient.rpc("downtime_top_problems", { p_mesin: m.key, p_stasiun_list: null, p_start: start.toISOString(), p_end: end.toISOString(), p_limit: 10 }),
          supabaseClient.rpc("downtime_by_category", { p_mesin: m.key, p_stasiun_list: null, p_start: start.toISOString(), p_end: end.toISOString() }),
        ]);
        const row = (aggRes.data && aggRes.data[0]) || {};
        const settings = settingsRes.data || { gsph_target_mode: "fixed", gsph_target_fixed: 0 };
        const whJam = (Number(row.wh_menit) || 0) / 60;
        const stroke = Number(row.stroke) || 0;
        const ng = Number(row.ng) || 0;
        const downtimeMenit = Math.round(Number(row.downtime_menit) || 0);
        const targetStdMenit = Number(row.target_std_menit) || 0;
        let targetGsph = Number(settings.gsph_target_fixed) || 0;
        if (settings.gsph_target_mode === "per_part" && targetStdMenit > 0) targetGsph = stroke / (targetStdMenit / 60);
        const gsph = whJam > 0 ? stroke / whJam : 0;
        const availability = whJam > 0 ? Math.max(0, (whJam * 60 - downtimeMenit) / (whJam * 60)) * 100 : 0;
        const performanceFactor = targetGsph > 0 ? Math.min(gsph / targetGsph, 1) * 100 : 0;
        const quality = stroke > 0 ? Math.max(0, (stroke - ng) / stroke) * 100 : 100;
        const oee = (availability / 100) * (performanceFactor / 100) * (quality / 100) * 100;
        return {
          mesin: m.key, label: m.label,
          data: { stroke, ng, downtimeMenit, gsph, availability, performanceFactor, quality, oee },
          top5: (top5Res.data || []).map((r) => ({ mesin: m.key, mesinLabel: m.label, kategori: r.kategori, problem: r.problem, menit: Math.round(Number(r.total_menit) || 0) })),
          byCategory: (catRes.data || []).map((r) => ({ kategori: r.kategori, menit: Math.round(Number(r.total_menit) || 0) })),
        };
      }));

      this.machines = MACHINES.map((m) => {
        const r = results.find((x) => x.mesin === m.key);
        return { ...m, data: r.data };
      });

      this.fleetTotals = results.reduce((acc, r) => ({
        stroke: acc.stroke + r.data.stroke, downtimeMenit: acc.downtimeMenit + r.data.downtimeMenit, ng: acc.ng + r.data.ng,
      }), { stroke: 0, downtimeMenit: 0, ng: 0 });

      const validOee = results.map((r) => r.data.oee).filter((v) => v > 0);
      this.fleetOee = validOee.length > 0 ? validOee.reduce((a, b) => a + b, 0) / validOee.length : 0;

      this.fleetTop10 = results.flatMap((r) => r.top5).sort((a, b) => b.menit - a.menit).slice(0, 10);

      this.loading = false;
      this.$nextTick(() => this.renderFleetChart(results));
    },

    oeeClass(oee) {
      if (oee === undefined || oee === null) return "";
      if (oee >= 70) return "machine-card-good";
      if (oee >= 50) return "machine-card-warn";
      return "machine-card-bad";
    },

    renderFleetChart(results) {
      const canvas = document.getElementById("fleetDowntimeChart");
      if (!canvas || typeof Chart === "undefined") return;
      if (this.chart) this.chart.destroy();
      const categories = ["MESIN", "DIES", "FINGER", "OTHER"];
      const colors = { MESIN: "#4d7cf5", DIES: "#d1454b", FINGER: "#2f9e63", OTHER: "#c9820f" };
      const datasets = categories.map((cat) => ({
        label: cat,
        data: results.map((r) => (r.byCategory.find((c) => c.kategori === cat) || {}).menit || 0),
        backgroundColor: colors[cat],
      }));
      this.chart = new Chart(canvas, {
        type: "bar",
        data: { labels: results.map((r) => r.label), datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "top", labels: { color: "#1c2126" } } },
          scales: {
            x: { stacked: true, ticks: { color: "#6b7480" }, grid: { display: false } },
            y: { stacked: true, ticks: { color: "#6b7480" }, grid: { color: "#eceff2" }, beginAtZero: true },
          },
        },
      });
    },

    logout,
  };
}
</script>
</body>
</html>
