<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer 2000t — Sistem Produksi &amp; Downtime</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1e24">
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabaseClient.js"></script>
<script src="../assets/machine-page.js"></script>
</head>
<body>

<div class="app-shell"
     x-data='machinePage("transfer_2000t", "Transfer 2000t", [], 0, ["MESIN", "DIES", "FINGER", "OTHER"], {"mode": "none"})'
     x-init="init()">
  <div class="mobile-topbar">
    <button class="hamburger" @click="mobileNavOpen = true">☰</button>
    <span class="mobile-title">Transfer 2000t</span>
  </div>
  <div class="sidebar-overlay" x-show="mobileNavOpen" @click="mobileNavOpen = false" x-cloak></div>
  <aside class="sidebar" :class="mobileNavOpen ? 'sidebar-open' : ''">
    <div class="sidebar-brand">PRODUKSI<span>&amp;</span>DOWNTIME</div>
    <nav class="sidebar-nav" @click="mobileNavOpen = false">
      <a href="../index.html" class="sidebar-link">🏠 Dashboard</a>
      <a href="tandem.html" class="sidebar-link">⚙️ Tandem</a>
      <a href="blanking.html" class="sidebar-link">⚙️ Blanking</a>
      <a href="transfer-2000t.html" class="sidebar-link active">⚙️ Transfer 2000t</a>
      <a href="transfer-800t.html" class="sidebar-link">⚙️ Transfer 800t</a>
      <a href="pc200t.html" class="sidebar-link">⚙️ PC200t</a>
    </nav>
    <div class="sidebar-foot">
      <div class="who" x-text="profile?.full_name || session?.user?.email || '...'"></div>
      <span class="badge" :class="profile?.role === 'admin' ? 'role-admin' : ''" x-text="profile?.role || '...'"></span>
      <div class="net-status" :class="isOnline ? 'net-online' : 'net-offline'">
        <span x-text="isOnline ? '🟢 Online' : '🔴 Offline'"></span>
        <span x-show="pendingCount > 0" x-text="'· ' + pendingCount + ' menunggu sinkron'"></span>
      </div>
      <button class="btn-ghost btn-sm" @click="logout()">Keluar</button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">
        <span class="eyebrow">Mesin</span>
        Transfer 2000t
      </h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-secondary btn-sm" :class="tab==='produksi' ? 'btn-primary' : ''" @click="tab='produksi'">Produksi</button>
        <button class="btn-secondary btn-sm" :class="tab==='downtime' ? 'btn-primary' : ''" @click="tab='downtime'">Downtime</button>
        <button class="btn-secondary btn-sm" :class="tab==='master' ? 'btn-primary' : ''" @click="tab='master'">Master Data</button>
      </div>
    </div>

    <template x-if="errorMsg"><div class="error-msg" x-text="errorMsg"></div></template>
    <template x-if="successMsg"><div class="success-msg" x-text="successMsg"></div></template>
    <template x-if="!isOnline">
      <div class="offline-banner">📴 Tidak ada jaringan — data baru akan disimpan di HP dan disinkron otomatis begitu online lagi.</div>
    </template>

    <template x-if="loading">
      <div class="empty-state">Memuat data...</div>
    </template>

    <template x-if="!loading">
      <div>
        <!-- ===================== TAB PRODUKSI ===================== -->
        <div x-show="tab === 'produksi'">

          <!-- Pilih line Tandem dulu (Lama/Baru) -->
          <div class="panel" x-show="stationConfig.mode === 'variant' && !tandemVariant">
            <p class="panel-title">Pilih Line Tandem</p>
            <div class="chip-row">
              <button type="button" class="btn-primary" @click="setTandemVariant('lama')">TDM Lama (PA-1 s/d PA-5)</button>
              <button type="button" class="btn-primary" @click="setTandemVariant('baru')">TDM Baru (PA-6 s/d PA-10)</button>
            </div>
          </div>
          <p class="hint" style="margin-bottom:16px;" x-show="stationConfig.mode === 'variant' && tandemVariant">
            Line aktif: <b x-text="tandemVariant === 'lama' ? 'TDM Lama (PA-1 s/d PA-5)' : 'TDM Baru (PA-6 s/d PA-10)'"></b>
            — <a href="#" @click.prevent="tandemVariant = null">ganti line</a>
          </p>

          
          <template x-for="st in stationList()" :key="st.id">
            <div class="panel station-card">
              <p class="panel-title" x-show="st.label"><span x-text="st.label"></span></p>

              <!-- Wajib diisi dulu kalau ada jeda dari produksi terakhir -->
              <div class="classification-box" x-show="lines[st.id].pendingClassification" x-cloak>
                <p class="classification-title">⏱ Ada jeda dari produksi terakhir — isi dulu sebelum mulai lagi</p>
                <p class="hint" x-text="'Jeda: ' + fmtClock(lines[st.id].classification.gapStart) + ' → ' + fmtClock(lines[st.id].classification.gapEnd) + ' (' + durasiMenit(lines[st.id].classification.gapStart, lines[st.id].classification.gapEnd) + ')'"></p>
                <div class="form-grid">
                  <div class="field">
                    <label>Kategori</label>
                    <select x-model="lines[st.id].classification.kategori">
                      <option value="DANDORI">Dandori</option>
                      <option value="WATARI">Watari</option>
                      <option value="STOP_LINE">Stop Line Terencana</option>
                      <option value="OTHER">Other</option>
                    </select>
                  </div>
                  <div class="field">
                    <label>Part Dari</label>
                    <div class="combo" x-data="comboBox(() => partNumberList.map(p => p.value), () => lines[st.id].classification.part_dari, (v) => lines[st.id].classification.part_dari = v)" @click.outside="open = false">
                      <input type="text" x-model="query" @input="onInput()" @focus="open = true" placeholder="Ketik atau pilih...">
                      <div class="combo-list" x-show="open && filtered().length > 0" x-cloak>
                        <template x-for="opt in filtered()" :key="opt">
                          <div class="combo-item" @mousedown.prevent="select(opt)" x-text="opt"></div>
                        </template>
                      </div>
                    </div>
                  </div>
                  <div class="field">
                    <label>Part Ke</label>
                    <div class="combo" x-data="comboBox(() => partNumberList.map(p => p.value), () => lines[st.id].classification.part_ke, (v) => lines[st.id].classification.part_ke = v)" @click.outside="open = false">
                      <input type="text" x-model="query" @input="onInput()" @focus="open = true" placeholder="Ketik atau pilih...">
                      <div class="combo-list" x-show="open && filtered().length > 0" x-cloak>
                        <template x-for="opt in filtered()" :key="opt">
                          <div class="combo-item" @mousedown.prevent="select(opt)" x-text="opt"></div>
                        </template>
                      </div>
                    </div>
                  </div>
                  <div class="field" style="grid-column: 1 / -1;">
                    <label>Keterangan (opsional)</label>
                    <input type="text" x-model="lines[st.id].classification.keterangan" placeholder="mis. watari ke line lain, dll">
                  </div>
                </div>
                <div class="form-actions">
                  <button type="button" class="btn-ghost" @click="cancelClassification(st.id)">Batal</button>
                  <button type="button" class="btn-primary" @click="confirmClassificationAndStart(st.id)">Simpan &amp; Mulai Produksi</button>
                </div>
              </div>

              <div class="timer-row" x-show="!lines[st.id].editingId && !lines[st.id].pendingClassification">
                <template x-if="lines[st.id].state === 'idle'">
                  <button type="button" class="btn-primary" @click="clickMulaiProduksi(st.id)">▶ Mulai Produksi</button>
                </template>
                <template x-if="lines[st.id].state !== 'idle'">
                  <div class="timer-badge">
                    <span class="timer-dot" :class="lines[st.id].state==='running' ? 'timer-dot-live' : ''"></span>
                    <span>Mulai <b x-text="fmtClock(lines[st.id].start)"></b></span>
                    <template x-if="lines[st.id].state === 'running'">
                      <button type="button" class="btn-secondary btn-sm" @click="stopProduction(st.id)">⏹ Selesai</button>
                    </template>
                    <template x-if="lines[st.id].state === 'stopped'">
                      <span>· Selesai <b x-text="fmtClock(lines[st.id].end)"></b></span>
                    </template>
                    <button type="button" class="btn-ghost btn-sm" @click="cancelProductionTimer(st.id)">Batal</button>
                  </div>
                </template>
              </div>
              <p class="hint" x-show="lines[st.id].editingId">Mode edit — waktu diambil dari data yang sudah ada, tidak pakai timer.</p>

              <form @submit.prevent="submitProduction(st.id)"
                    x-show="(lines[st.id].editingId || lines[st.id].state !== 'idle') && !lines[st.id].pendingClassification" x-cloak>
                <div class="form-grid">
                  <div class="field">
                    <label>Part Number</label>
                    <div class="combo" x-data="comboBox(() => partNumberList.map(p => p.value), () => lines[st.id].form.part_number, (v) => lines[st.id].form.part_number = v)" @click.outside="open = false">
                      <input type="text" x-model="query" @input="onInput()" @focus="open = true" placeholder="Ketik atau pilih...">
                      <div class="combo-list" x-show="open && filtered().length > 0" x-cloak>
                        <template x-for="opt in filtered()" :key="opt">
                          <div class="combo-item" @mousedown.prevent="select(opt)" x-text="opt"></div>
                        </template>
                      </div>
                    </div>
                  </div>
                  <div class="field"><label>Qty</label><input type="number" x-model="lines[st.id].form.qty"></div>
                  <div class="field"><label>NG</label><input type="number" x-model="lines[st.id].form.ng"></div>
                  <div class="field"><label>Kategori NG</label><input type="text" x-model="lines[st.id].form.kategori_ng"></div>
                  <div class="field"><label>Break (menit)</label><input type="number" x-model="lines[st.id].form.break_menit"></div>

                </div>

                <div class="field" x-show="routingMax > 0" style="margin-bottom:16px;">
                  <label>Routing</label>
                  <div class="chip-row">
                    <button type="button" class="chip" :class="lines[st.id].routingType==='WIP' ? 'chip-active' : ''" @click="setRoutingType(st.id, 'WIP')">WIP</button>
                    <button type="button" class="chip" :class="lines[st.id].routingType==='FG' ? 'chip-active' : ''" @click="setRoutingType(st.id, 'FG')">FG</button>
                  </div>
                  <div class="chip-row" x-show="lines[st.id].routingType" style="margin-top:8px;">
                    <template x-for="n in routingRange()" :key="n">
                      <button type="button" class="chip chip-num" :class="lines[st.id].routingNumbers.includes(n) ? 'chip-active' : ''" @click="toggleRoutingNumber(st.id, n)" x-text="n"></button>
                    </template>
                  </div>
                </div>

                <div class="form-actions">
                  <button type="button" class="btn-ghost" x-show="lines[st.id].editingId" @click="cancelProductionTimer(st.id)">Batal Edit</button>
                  <button type="submit" class="btn-primary"
                          :disabled="!lines[st.id].editingId && lines[st.id].state !== 'stopped'"
                          x-text="lines[st.id].editingId ? 'Simpan Perubahan' : 'Simpan Data'"></button>
                </div>
              </form>
            </div>
          </template>

          <div class="panel" x-show="editingNonProduksiId" x-cloak>
            <p class="panel-title">Edit Data Non-Produksi</p>
            <div class="form-grid">
              <div class="field"><label>Waktu Awal</label><input type="datetime-local" x-model="nonProduksiEditForm.waktu_awal"></div>
              <div class="field"><label>Waktu Akhir</label><input type="datetime-local" x-model="nonProduksiEditForm.waktu_akhir"></div>
              <div class="field">
                <label>Kategori</label>
                <select x-model="nonProduksiEditForm.kategori">
                  <option value="DANDORI">Dandori</option>
                  <option value="WATARI">Watari</option>
                  <option value="STOP_LINE">Stop Line Terencana</option>
                  <option value="OTHER">Other</option>
                </select>
              </div>
              <div class="field"><label>Part Dari</label><input type="text" x-model="nonProduksiEditForm.part_dari"></div>
              <div class="field"><label>Part Ke</label><input type="text" x-model="nonProduksiEditForm.part_ke"></div>
              <div class="field" style="grid-column: 1 / -1;"><label>Keterangan</label><input type="text" x-model="nonProduksiEditForm.keterangan"></div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn-ghost" @click="cancelEditNonProduksi()">Batal</button>
              <button type="button" class="btn-primary" @click="saveNonProduksiEdit()">Simpan</button>
            </div>
          </div>

          <div class="panel">
            <p class="panel-title">Riwayat <span class="count" x-text="riwayatGabungan().length + ' baris'"></span></p>
            <p class="hint" style="margin-bottom:12px;">Produksi dan non-produksi (Dandori/Watari/Stop Line/Break/dll) digabung urut waktu, seperti Nippo.</p>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Kode</th>
                    <th x-show="stationConfig.mode !== 'none'">Stasiun</th>
                    <th>Waktu Awal</th><th>Waktu Akhir</th>
                    <th>Jenis Produksi</th>
                    <th>Part Number</th>
                    <th>Qty</th><th>NG</th><th>Kategori NG</th>
                    <th>Durasi Produksi</th><th>Durasi Dandori</th><th>Break</th>
                    <th x-show="routingMax > 0">Routing</th>

                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in riwayatGabungan()" :key="row._tipe + '-' + row.id">
                    <tr :class="row._pending ? 'row-pending' : ''">
                      <td class="mono" x-text="row._tipe === 'produksi' ? (row.kode || (row._pending ? '⏳' : '-')) : '-'"></td>
                      <td class="mono" x-show="stationConfig.mode !== 'none'" x-text="row.stasiun || '-'"></td>
                      <td class="mono" x-text="fmt(row.waktu_awal)"></td>
                      <td class="mono" x-text="fmt(row.waktu_akhir)"></td>
                      <td x-text="jenisProduksiLabel(row)"></td>
                      <td x-text="detailRiwayat(row)"></td>
                      <td x-text="row._tipe === 'produksi' ? (row.qty ?? '-') : '-'"></td>
                      <td x-text="row._tipe === 'produksi' ? (row.ng ?? '-') : '-'"></td>
                      <td x-text="row._tipe === 'produksi' ? (row.kategori_ng || '-') : '-'"></td>
                      <td class="mono" x-text="durasiProduksiCell(row)"></td>
                      <td class="mono" x-text="durasiDandoriCell(row)"></td>
                      <td class="mono" x-text="breakCell(row)"></td>
                      <td x-show="routingMax > 0" x-text="row._tipe === 'produksi' ? routingLabel(row) : '-'"></td>

                      <td>
                        <span class="badge" x-show="row._pending">⏳ Belum sinkron</span>
                        <div class="row-actions" x-show="!row._pending">
                          <button class="btn-secondary btn-sm" @click="editRiwayat(row)">Edit</button>
                          <button class="btn-danger btn-sm" @click="deleteRiwayat(row)">Hapus</button>
                        </div>
                      </td>
                    </tr>
                  </template>
                  <tr x-show="riwayatGabungan().length === 0">
                    <td colspan="20" class="empty-state">Belum ada data untuk mesin ini.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ===================== TAB DOWNTIME ===================== -->
        <div x-show="tab === 'downtime'">
          <div class="panel">
            <p class="panel-title" x-text="editingDowntimeId ? 'Edit Data Downtime' : 'Catat Downtime'"></p>

            <div class="timer-row" x-show="!editingDowntimeId">
              <template x-if="dtState === 'idle'">
                <button type="button" class="btn-primary" @click="startDowntime()">▶ Mulai Downtime</button>
              </template>
              <template x-if="dtState !== 'idle'">
                <div class="timer-badge">
                  <span class="timer-dot" :class="dtState==='running' ? 'timer-dot-live' : ''"></span>
                  <span>Mulai <b x-text="fmtClock(dtStart)"></b></span>
                  <template x-if="dtState === 'running'">
                    <button type="button" class="btn-secondary btn-sm" @click="stopDowntime()">⏹ Selesai</button>
                  </template>
                  <template x-if="dtState === 'stopped'">
                    <span>· Selesai <b x-text="fmtClock(dtEnd)"></b></span>
                  </template>
                  <button type="button" class="btn-ghost btn-sm" @click="cancelDowntimeTimer()">Batal</button>
                </div>
              </template>
            </div>
            <p class="hint" x-show="editingDowntimeId">Mode edit — waktu diambil dari data yang sudah ada, tidak pakai timer.</p>

            <form @submit.prevent="submitDowntime" x-show="editingDowntimeId || dtState !== 'idle'" x-cloak>
              <div class="form-grid">
                <div class="field">
                  <label>Kategori</label>
                  <select x-model="downtimeForm.kategori">
                    <option value="">- pilih -</option>
                    <template x-for="k in kategoriOptions" :key="k">
                      <option :value="k" x-text="k"></option>
                    </template>
                  </select>
                </div>
                <div class="field" style="grid-column: span 2;">
                  <label>Problem</label>
                  <div class="combo" x-data="comboBox(() => problemList.map(p => p.value), () => downtimeForm.problem, (v) => downtimeForm.problem = v)" @click.outside="open = false">
                    <input type="text" x-model="query" @input="onInput()" @focus="open = true" placeholder="Ketik atau pilih...">
                    <div class="combo-list" x-show="open && filtered().length > 0" x-cloak>
                      <template x-for="opt in filtered()" :key="opt">
                        <div class="combo-item" @mousedown.prevent="select(opt)" x-text="opt"></div>
                      </template>
                    </div>
                  </div>
                </div>
                <div class="field" style="grid-column: span 2;">
                  <label>Penyebab</label>
                  <input type="text" x-model="downtimeForm.penyebab">
                </div>
                <div class="field" style="grid-column: span 2;">
                  <label>Countermeasure</label>
                  <input type="text" x-model="downtimeForm.countermeasure">
                </div>
              </div>
              <div class="form-actions">
                <button type="button" class="btn-ghost" x-show="editingDowntimeId" @click="resetDowntimeForm()">Batal Edit</button>
                <button type="submit" class="btn-primary"
                        :disabled="!editingDowntimeId && dtState !== 'stopped'"
                        x-text="editingDowntimeId ? 'Simpan Perubahan' : 'Simpan Data'"></button>
              </div>
            </form>
          </div>

          <div class="panel">
            <p class="panel-title">Riwayat Downtime <span class="count" x-text="downtimeRows.length + ' baris'"></span></p>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Waktu Awal</th><th>Waktu Akhir</th><th>Durasi</th>
                    <th>Kategori</th><th>Problem</th><th>Penyebab</th><th>Countermeasure</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in downtimeRows" :key="row.id">
                    <tr :class="row._pending ? 'row-pending' : ''">
                      <td class="mono" x-text="fmt(row.waktu_awal)"></td>
                      <td class="mono" x-text="fmt(row.waktu_akhir)"></td>
                      <td class="mono" x-text="durasiMenit(row.waktu_awal, row.waktu_akhir)"></td>
                      <td><span class="badge" x-text="row.kategori || '-'"></span></td>
                      <td x-text="row.problem || '-'"></td>
                      <td x-text="row.penyebab || '-'"></td>
                      <td x-text="row.countermeasure || '-'"></td>
                      <td>
                        <span class="badge" x-show="row._pending">⏳ Belum sinkron</span>
                        <div class="row-actions" x-show="!row._pending">
                          <button class="btn-secondary btn-sm" @click="editDowntime(row)">Edit</button>
                          <button class="btn-danger btn-sm" @click="deleteDowntime(row.id)">Hapus</button>
                        </div>
                      </td>
                    </tr>
                  </template>
                  <tr x-show="downtimeRows.length === 0">
                    <td colspan="8" class="empty-state">Belum ada data downtime untuk mesin ini.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ===================== TAB MASTER DATA ===================== -->
        <div x-show="tab === 'master'">
          <div class="panel">
            <p class="panel-title">Daftar Part Number <span class="count" x-text="partNumberList.length + ' item'"></span></p>
            <p class="hint" style="margin-bottom:12px;">Dropdown Part Number di form Produksi ambil dari daftar ini. Klik Edit untuk ubah teks atau atur "Proses Selanjutnya" (part number ini lanjut ke line mana), lalu Simpan.</p>
            <div class="master-add-row">
              <input type="text" x-model="newPartNumberValue" @keyup.enter="addMasterPartNumber()" placeholder="Tambah part number baru...">
              <button type="button" class="btn-primary btn-sm" @click="addMasterPartNumber()">+ Tambah</button>
            </div>
            <div class="master-list">
              <template x-for="item in partNumberList" :key="item.id">
                <div class="master-list-row">
                  <template x-if="!item.editing">
                    <div style="flex:1;">
                      <span class="master-value" x-text="item.value"></span>
                      <div class="next-process-display" x-show="item.next_processes && item.next_processes.length">
                        <template x-for="(p, i) in item.next_processes" :key="i">
                          <div class="next-process-chip">
                            <span class="hint">next proses:</span> <b x-text="machineLabel(p.line)"></b>
                            <span class="hint">· part number:</span> <span x-text="p.part_number"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="item.editing">
                    <div style="flex:1;display:flex;flex-direction:column;gap:10px;">
                      <input type="text" x-model="item.draft" placeholder="Part number" @keyup.enter="saveMasterPartNumber(item)">
                      <div>
                        <label class="hint" style="display:block;margin-bottom:6px;">Proses Selanjutnya (boleh lebih dari satu, mis. part yang separating)</label>
                        <template x-for="proc in item.draftNextProcesses" :key="proc._key">
                          <div class="next-process-row">
                            <div style="flex:1;min-width:150px;">
                              <label class="hint" style="display:block;margin-bottom:4px;">Ke Line</label>
                              <select x-model="proc.line" @change="ensurePartNumbersForLine(proc.line)">
                                <option value="">- pilih line -</option>
                                <template x-for="m in machineOptions" :key="m.key">
                                  <option :value="m.key" x-text="m.label"></option>
                                </template>
                              </select>
                            </div>
                            <div style="flex:1;min-width:150px;">
                              <label class="hint" style="display:block;margin-bottom:4px;">Part Number di line itu</label>
                            <div class="combo" x-data="comboBox(() => (partNumbersByLine[proc.line] || []), () => proc.part_number, (v) => proc.part_number = v)" @click.outside="open = false">
                              <input type="text" x-model="query" @input="onInput()" @focus="open = true" placeholder="Part number di line itu">
                              <div class="combo-list" x-show="open && filtered().length > 0" x-cloak>
                                <template x-for="opt in filtered()" :key="opt">
                                  <div class="combo-item" @mousedown.prevent="select(opt)" x-text="opt"></div>
                                </template>
                              </div>
                            </div>
                            </div>
                            <button type="button" class="btn-danger btn-sm" style="margin-top:20px;" @click="removeNextProcessRow(item, proc._key)">✕</button>
                          </div>
                        </template>
                        <button type="button" class="btn-secondary btn-sm" @click="addNextProcessRow(item)">+ Tambah proses selanjutnya</button>
                      </div>
                    </div>
                  </template>
                  <div class="master-row-actions">
                    <template x-if="!item.editing">
                      <button type="button" class="btn-secondary btn-sm" @click="startEditPartNumber(item)">Edit</button>
                    </template>
                    <template x-if="item.editing">
                      <button type="button" class="btn-primary btn-sm" @click="saveMasterPartNumber(item)">Simpan</button>
                    </template>
                    <template x-if="item.editing">
                      <button type="button" class="btn-ghost btn-sm" @click="cancelEditPartNumber(item)">Batal</button>
                    </template>
                    <button type="button" class="btn-danger btn-sm" @click="deleteMasterPartNumber(item.id)">Hapus</button>
                  </div>
                </div>
              </template>
              <p class="empty-state" x-show="partNumberList.length === 0">Belum ada data. Tambah lewat kotak di atas.</p>
            </div>
          </div>

          <div class="panel">
            <p class="panel-title">Daftar Problem Downtime <span class="count" x-text="problemList.length + ' item'"></span></p>
            <p class="hint" style="margin-bottom:12px;">Dropdown Problem di form Downtime ambil dari daftar ini.</p>
            <div class="master-add-row">
              <input type="text" x-model="newProblemValue" @keyup.enter="addMasterProblem()" placeholder="Tambah problem baru...">
              <button type="button" class="btn-primary btn-sm" @click="addMasterProblem()">+ Tambah</button>
            </div>
            <div class="master-list">
              <template x-for="item in problemList" :key="item.id">
                <div class="master-list-row">
                  <template x-if="!item.editing">
                    <span class="master-value" x-text="item.value"></span>
                  </template>
                  <template x-if="item.editing">
                    <input type="text" x-model="item.draft" @keyup.enter="saveMasterProblem(item)" @keyup.escape="cancelEditProblem(item)">
                  </template>
                  <div class="master-row-actions">
                    <template x-if="!item.editing">
                      <button type="button" class="btn-secondary btn-sm" @click="startEditProblem(item)">Edit</button>
                    </template>
                    <template x-if="item.editing">
                      <button type="button" class="btn-primary btn-sm" @click="saveMasterProblem(item)">Simpan</button>
                    </template>
                    <template x-if="item.editing">
                      <button type="button" class="btn-ghost btn-sm" @click="cancelEditProblem(item)">Batal</button>
                    </template>
                    <button type="button" class="btn-danger btn-sm" @click="deleteMasterProblem(item.id)">Hapus</button>
                  </div>
                </div>
              </template>
              <p class="empty-state" x-show="problemList.length === 0">Belum ada data. Tambah lewat kotak di atas.</p>
            </div>
          </div>
        </div>
      </div>
    </template>
  </main>
</div>

</body>
</html>
